<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日汇总</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f2f5; color:#333; padding:12px 12px 40px; font-size:14px; }
.header { text-align:center; margin:8px 0 16px; position:relative; }
.header .title { font-size:20px; font-weight:700; }
.date-bar { display:flex; gap:8px; margin:12px 0; align-items:center; }
.date-bar input { flex:1; padding:8px 12px; border:1px solid #d0d5dd; border-radius:8px; font-size:15px; background:#fff; }
.date-bar button { padding:8px 18px; background:#1a73e8; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; font-weight:600; }
.date-info { font-size:17px; font-weight:700; text-align:center; padding:4px 0 8px; }
.day-seq { font-size:13px; color:#888; text-align:center; padding:0 0 8px; }
.amount-box { background:linear-gradient(135deg,#1a73e8,#0d47a1); color:#fff; border-radius:12px; padding:18px; text-align:center; margin:8px 0 12px; }
.amount-box .label { font-size:12px; opacity:.8; }
.amount-box .value { font-size:30px; font-weight:700; margin-top:2px; }
.filter-bar { display:flex; align-items:center; gap:6px; padding:8px 0; flex-wrap:wrap; }
.filter-label { font-size:12px; color:#888; white-space:nowrap; }
.filter-chip { display:inline-flex; align-items:center; gap:3px; padding:3px 10px; border-radius:14px; font-size:12px; background:#f0f0f0; cursor:pointer; user-select:none; border:1px solid transparent; }
.filter-chip:has(input:checked) { background:#e3f2fd; border-color:#90caf9; color:#1565c0; }
.filter-chip input { display:none; }
.btn-collect { width:100%; padding:12px; background:#4caf50; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; margin:8px 0; cursor:pointer; }
.btn-collect:active { opacity:.8; }
.btn-collect:disabled { background:#aaa; }
.btn-sync { width:100%; padding:12px; background:#ff9800; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; margin:0 0 8px; cursor:pointer; }
.btn-sync:active { opacity:.8; }
.btn-sync:disabled { background:#aaa; }
.cron-row { display:flex; align-items:center; gap:8px; padding:10px 0; font-size:14px; flex-wrap:wrap; }
.cron-label { color:#888; }
.cron-time { font-weight:700; color:#ff9800; font-size:16px; }
.cron-edit { padding:4px 12px; background:none; border:1px solid #ff9800; color:#ff9800; border-radius:6px; font-size:12px; cursor:pointer; }
.cron-edit-panel { display:flex; align-items:center; gap:6px; width:100%; margin-top:6px; }
.cron-edit-panel input { padding:6px; border:1px solid #d0d5dd; border-radius:6px; font-size:14px; }
.cron-save { padding:6px 14px; background:#ff9800; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer; }
.cron-cancel { padding:6px 14px; background:none; border:1px solid #d0d5dd; color:#888; border-radius:6px; font-size:13px; cursor:pointer; }
.card { background:#fff; border-radius:10px; padding:14px; margin:8px 0; box-shadow:0 1px 3px rgba(0,0,0,.06); cursor:pointer; }
.card-header { display:flex; justify-content:space-between; align-items:center; }
.card .name { font-size:16px; font-weight:600; }
.card .meta { font-size:11px; color:#888; margin-top:2px; }
.card .val { font-size:20px; font-weight:700; color:#1a73e8; }
.card .rate { font-size:11px; color:#4caf50; text-align:right; }
.card-arrow { font-size:11px; color:#aaa; margin-left:4px; }
.rank { display:inline-block; background:#1a73e8; color:#fff; font-size:11px; font-weight:700; padding:1px 6px; border-radius:8px; margin-right:4px; vertical-align:middle; }
.draw-rank { display:inline-block; background:#e65100; color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; margin-left:6px; vertical-align:middle; }
.proj-list { display:none; margin-top:10px; padding-top:10px; border-top:1px solid #eee; }
.proj-list.show { display:block; }
    .proj-item { display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px solid #f5f5f5; cursor:pointer; flex-wrap:wrap; }
    .proj-item:last-child { border-bottom:none; }
    .proj-name { font-size:13px; color:#555; }
    .proj-val { font-size:13px; font-weight:600; color:#1565c0; }
    .proj-grids { color:#999; font-size:11px; margin-left:4px; }
    .grid-list { display:none; width:100%; margin-left:16px; padding:4px 0 4px 8px; border-left:2px solid #e3f2fd; }
    .grid-list.show { display:block; }
    .grid-item { display:flex; justify-content:space-between; padding:4px 0; font-size:12px; }
    .grid-cn { color:#e65100; font-weight:600; min-width:32px; }
    .grid-nums { color:#555; flex:1; margin:0 8px; word-break:break-all; }
    .grid-val { color:#1565c0; font-weight:600; white-space:nowrap; }
    /* 记录行（二级展开） */
    .rec-list { display:none; margin-top:10px; padding-top:10px; border-top:1px solid #eee; }
    .rec-list.show { display:block; }
    .rec-item { display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px solid #f0f0f0; cursor:pointer; flex-wrap:wrap; }
    .rec-item:last-child { border-bottom:none; }
    .rec-label { font-size:14px; font-weight:600; color:#e65100; min-width:60px; }
    .rec-cum { font-size:13px; color:#333; flex:1; margin:0 8px; }
    .rec-rank { font-size:11px; color:#888; }
    .rec-projs { color:#999; font-size:11px; margin-left:4px; }
.loading { text-align:center; padding:40px; color:#999; }
.empty { text-align:center; padding:40px; color:#999; font-size:14px; }
.expand-hint { font-size:11px; color:#ccc; text-align:center; margin-top:2px; }
    .meta-card { flex:1; border-radius:10px; padding:12px; text-align:center; color:#fff; cursor:pointer; position:relative; }
    .meta-card .mc-label { font-size:11px; opacity:.85; }
    .meta-card .mc-result { font-size:22px; font-weight:700; margin:4px 0; }
    .meta-card .mc-rank { font-size:13px; opacity:.9; }
    .meta-card .mc-arrow { font-size:10px; opacity:.6; position:absolute; bottom:6px; right:10px; }
    .meta-expand { background:#fff; border-radius:8px; margin:4px 0 8px; padding:8px 12px; display:none; box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .meta-expand.show { display:block; }
    .meta-expand .me-title { font-size:12px; color:#888; margin-bottom:6px; }
    .meta-expand .me-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:13px; border-bottom:1px solid #f0f0f0; }
    .meta-expand .me-row:last-child { border-bottom:none; }
    .meta-expand .me-name { color:#333; font-weight:500; }
    .meta-expand .me-val { color:#1a73e8; font-weight:600; }
    .meta-expand .me-rank { display:inline-block; background:#e65100; color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; margin-left:6px; }
    .meta-expand .me-mini-card { border:1px solid #e8e8e8; border-radius:8px; margin:4px 0; padding:8px 10px; background:#fafafa; }
    .meta-expand .me-mini-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:2px 0; }
    .meta-expand .me-mini-name { font-size:14px; font-weight:600; color:#333; }
    .meta-expand .me-mini-arrow { font-size:10px; color:#999; transition:transform .2s; display:inline-block; width:12px; }
    .meta-expand .me-mini-arrow.open { transform:rotate(90deg); }
    .meta-expand .me-mini-meta { font-size:11px; color:#999; padding:2px 0 4px 18px; }
    .meta-expand .me-mini-rec { display:none; border-top:1px solid #eee; margin-top:4px; padding-top:2px; }
    .meta-expand .me-mini-rec.show { display:block; }
/* 预警横幅 */
.alert-banner { margin:4px 0 8px; padding:10px 14px; background:#fff3e0; border-left:4px solid #e65100; border-radius:6px; font-size:13px; color:#bf360c; cursor:pointer; line-height:1.6; }
.alert-banner b { color:#e65100; }
/* 铃铛按钮 */
.bell-btn { width:40px; height:40px; border-radius:10px; border:1px solid #d0d5dd; background:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; }
.bell-btn.has-alert { border-color:#e65100; background:#fff3e0; animation:pulse .8s ease infinite alternate; }
@keyframes pulse { from{transform:scale(1)} to{transform:scale(1.1)} }
.bell-dot { position:absolute; top:4px; right:4px; width:8px; height:8px; background:#ee0a24; border-radius:50%; display:none; }
.bell-dot.show { display:block; }
.bell-badge { position:absolute; top:-6px; right:-6px; min-width:18px; height:18px; border-radius:9px; background:#ee0a24; color:#fff; font-size:10px; font-weight:700; display:none; align-items:center; justify-content:center; padding:0 4px; line-height:18px; }
.bell-badge.show { display:flex; }
/* 铃铛弹窗 */
.bell-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:12px; padding:20px; box-shadow:0 8px 30px rgba(0,0,0,.2); z-index:100; width:300px; max-width:90vw; }
.bell-popup-header { font-size:17px; font-weight:700; color:#333; margin-bottom:16px; }
.bell-popup-row { display:flex; align-items:center; justify-content:space-between; margin:10px 0; font-size:15px; }
.bell-popup-hint { font-size:12px; color:#999; margin-top:6px; }
/* 记录排位标签 */
.rec-rank-badge { display:inline-block; background:#e65100; color:#fff; font-size:11px; font-weight:700; padding:1px 7px; border-radius:10px; margin:0 4px; }
.rec-rank-badge.danger { background:#ee0a24; animation:pulse-badge .6s ease infinite alternate; }
@keyframes pulse-badge { from{opacity:1} to{opacity:.5} }
.rec-val { font-size:12px; color:#1a73e8; font-weight:600; white-space:nowrap; }
.rec-info { display:flex; align-items:center; gap:6px; flex:1; margin:0 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="title" style="text-align:center;margin-bottom:12px">📊 每日汇总</div>
  <button class="bell-btn" id="bellBtn" onclick="toggleBellSettings()" title="预警设置" style="position:absolute;top:0;right:0">🔔<span class="bell-badge" id="bellBadge"></span></button>
</div>
<div class="date-info" id="dateInfo">--</div>
<div class="day-seq" id="daySeq"></div>
<div class="alert-banner" id="alertBanner" style="display:none" onclick="scrollToFirstAlert()"></div>

<div class="date-bar">
  <input type="date" id="dateInput">
  <button onclick="loadData()">查询</button>
</div>

<div class="amount-box">
  <div class="label">累计总额</div>
  <div class="value" id="dailyAmount">--</div>
</div>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">汇总筛选</span>
</div>

<button class="btn-collect" onclick="collectData()" id="btnCollect">📸 采集当日全量数据</button>
<button class="btn-sync" onclick="syncToStore()" id="btnSync">🏪 同步到门店</button>

<div class="cron-row">
  <span class="cron-label">⏰ 定时同步</span>
  <span class="cron-time" id="cronDisplay">02:00</span>
  <button class="cron-edit" onclick="toggleCronEdit()">修改</button>
  <div class="cron-edit-panel" id="cronEditPanel" style="display:none">
    <input type="number" id="cronHour" min="0" max="23" value="2" style="width:50px;text-align:center"> :
    <input type="number" id="cronMinute" min="0" max="59" value="0" style="width:50px;text-align:center">
    <button class="cron-save" onclick="saveCron()">保存</button>
    <button class="cron-cancel" onclick="toggleCronEdit()">取消</button>
  </div>
</div>

<div class="bell-popup" id="bellPopup" style="display:none">
  <div class="bell-popup-header">🔔 预警设置</div>
  <div class="bell-popup-row">
    <span>排位阈值</span>
    <input type="number" id="alertThreshold" min="1" max="49" value="45" style="width:60px;padding:4px 8px;border:1px solid #d0d5dd;border-radius:6px;text-align:center;font-size:16px">
  </div>
  <div class="bell-popup-hint">当某个B级汇总下 ≥3 条记录的排位超过此阈值时报警</div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="cron-save" onclick="saveBellSettings()" style="flex:1">保存</button>
    <button class="cron-cancel" onclick="toggleBellSettings()" style="flex:1">取消</button>
  </div>
</div>

<div id="cardList"></div>

<div style="margin-top:16px;display:flex;gap:10px" id="metaCards"></div>

<script>
const API = 'api/export';
const CID = 19;  // 固定A级集合
let _summariesData = [];
let _collName = '';
let _recordRanks = {};  // {summary_name: [{run_group, value, rank}, ...]}
let _alertThreshold = 45;  // 默认值，initSettings() 后从服务端加载

// 加载集合信息 → 动态构建筛选芯片
async function initCollection() {
  try {
    const resp = await fetch(API + '/collection-info?collection_id=' + CID);
    const data = await resp.json();
    _collName = data.collection_name;
    document.querySelector('.title').textContent = '📊 ' + _collName;
    // 动态构建 filter chips
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '<span class="filter-label">汇总筛选</span>';
    data.summaries.forEach((s, i) => {
      const label = document.createElement('label');
      label.className = 'filter-chip';
      label.id = 'chip' + (i+1);
      label.innerHTML = '<input type="checkbox" checked onchange="onFilterChange()" data-name="'+s.name+'">' + s.name;
      bar.appendChild(label);
    });
    // 默认全选中，初始累计需要等 loadData 后再算
  } catch(e) {
    console.error('加载集合信息失败', e);
  }
}

// 筛选变化 → 重算累计
function onFilterChange() {
  const checked = new Set();
  document.querySelectorAll('.filter-chip input:checked').forEach(cb => checked.add(cb.dataset.name));
  let total = 0;
  _summariesData.forEach(s => { if (checked.has(s.name)) total += (s.total_value || 0); });
  document.getElementById('dailyAmount').textContent = total.toLocaleString();
}

// 默认取最新快照日期
async function initDefaultDate() {
  try {
    const resp = await fetch(API + '/latest-snapshot-date?collection_id=' + CID);
    const data = await resp.json();
    return data.date || new Date().toISOString().split('T')[0];
  } catch(e) {
    return new Date().toISOString().split('T')[0];
  }
}

async function loadData() {
  const date = document.getElementById('dateInput').value;
  document.getElementById('cardList').innerHTML = '<div class="loading">加载中...</div>';
  document.getElementById('dailyAmount').textContent = '--';
  document.getElementById('dateInfo').textContent = '加载中...';
  
  try {
    // 主集合 19
    const [sumResp, detailResp, gridResp, rankResp] = await Promise.all([
      fetch(API + '/daily-summary?collection_id=' + CID + '&date=' + date),
      fetch(API + '/daily-detail?collection_id=' + CID + '&date=' + date),
      fetch(API + '/grid-detail?collection_id=' + CID + '&date=' + date),
      fetch(API + '/record-ranks?collection_id=' + CID + '&date=' + date)
    ]);
    const sumData = await sumResp.json();
    const detailData = await detailResp.json();
    const gridData = await gridResp.json();
    const rankData = await rankResp.json();
    _recordRanks = rankData.summaries || {};

    document.getElementById('dateInfo').textContent = sumData.date + '  ·  抽签数' + (sumData.draw_number || '-');
    document.getElementById('daySeq').textContent = sumData.day_seq ? '日期序号 ' + sumData.day_seq : '';
    _summariesData = sumData.summaries || [];
    _metaExpandCache = {};  // 切日期清缓存
    onFilterChange();
    loadMetaCards(date);
    
    if (!sumData.summaries || sumData.summaries.length === 0) {
      document.getElementById('cardList').innerHTML = '<div class="empty">暂无数据，请先采集</div>';
    } else {
      document.getElementById('cardList').innerHTML = renderCards(sumData.summaries, detailData.summaries || {}, gridData.grids || {});
      checkAlerts();
    }
    
  } catch(e) {
    document.getElementById('cardList').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}

function renderCards(summaries, projMap, gridMap) {
  let html = '';
  summaries.forEach(s => {
    const projects = projMap[s.name] || [];
    const snGrids = gridMap[s.name] || [];
    const dr = s.draw_value_rank;
    const rankHtml = dr ? ' <span class="draw-rank">排位 '+dr+'</span>' : '';
    // 统计 run_group 数
    const rgSet = new Set(projects.map(p => p.run_group).filter(Boolean));
    const rgCount = rgSet.size;
    html += '<div class="card" onclick="toggleRec(this)"><div class="card-header"><div><div class="name">'+s.name+rankHtml+' <span class="card-arrow">▶</span></div><div class="meta">'+rgCount+' 记录 · '+projects.length+' 项目 · 命中率 '+s.hit_rate+'%</div></div><div><div class="val">¥'+(s.total_value || 0).toLocaleString()+'</div><div class="rate">'+s.hit_rate+'%</div></div></div><div class="rec-list">'+buildRecordList(projects, snGrids, s.name)+'</div></div>';
  });
  return html + '<div class="expand-hint">👆 点击卡片展开记录 → 再点记录展开项目</div>';
}

function buildRecordList(projects, grids, summaryName) {
  // project_id → run_group 映射
  const projRG = {};
  projects.forEach(p => { projRG[p.project_id] = p.run_group || ''; });
  // grid 也补上 run_group
  grids.forEach(g => { if(!g._rg) g._rg = projRG[g.project_id] || ''; });
  
  // 排位查找：summaryName → run_group → {value, rank}
  const rankByRG = {};
  (_recordRanks[summaryName] || []).forEach(r => { rankByRG[r.run_group] = r; });

  // 按 run_group 分组
  const rgMap = {};
  projects.forEach(p => {
    const rg = p.run_group || '';
    if(!rg) return;
    if(!rgMap[rg]) rgMap[rg] = {projects:[], grids:[]};
    rgMap[rg].projects.push(p);
  });
  grids.forEach(g => {
    const rg = g._rg || '';
    if(!rg) return;
    if(!rgMap[rg]) rgMap[rg] = {projects:[], grids:[]};
    rgMap[rg].grids.push(g);
  });
  
  // 按 记录N 数字排序
  const keys = Object.keys(rgMap).sort((a,b) => {
    const na = parseInt(a.replace(/[^0-9]/g,'')) || 0;
    const nb = parseInt(b.replace(/[^0-9]/g,'')) || 0;
    return na - nb;
  });
  
  return keys.map(rg => {
    const d = rgMap[rg];
    const totalCum = d.grids.reduce((s,g) => s + (g.cumulative_sum||0), 0);
    const rk = rankByRG[rg];
    const rank = rk ? rk.rank : null;
    const val = rk ? rk.value : 0;
    // 排位标签
    const isDanger = rank !== null && rank > _alertThreshold;
    const rankBadge = rank !== null
      ? '<span class="rec-rank-badge'+(isDanger?' danger':'')+'">排位 '+rank+'</span>'
      : '<span class="rec-rank-badge" style="background:#999">排位 --</span>';
    const valColor = val >= 0 ? '#4caf50' : '#f44336';
    const valStr = '<span class="rec-val" style="color:'+valColor+'">值 ¥'+val.toLocaleString()+'</span>';
    const projHtml = d.projects.map(p => {
      const pg = d.grids.filter(g => g.project_id === p.project_id);
      const maxCum = pg.length ? Math.max(...pg.map(g=>g.cumulative_sum||0)) : 0;
      const pv = p.value || 0;
      const pvColor = pv >= 0 ? '#4caf50' : '#f44336';
      return '<div class="grid-item">' +
        '<span class="proj-name">'+p.project_name+'</span>' +
        '<span class="grid-nums">累计 ¥'+maxCum.toLocaleString()+'</span>' +
        '<span class="grid-cn" style="color:'+pvColor+'">值 ¥'+pv.toLocaleString()+'</span>' +
      '</div>';
    }).join('');
    return '<div class="rec-item" onclick="event.stopPropagation();toggleRecItem(this)">' +
      '<span class="rec-label">'+rg+'</span>' +
      '<div class="rec-info">'+valStr+rankBadge+'</div>' +
      '<span class="rec-cum">累计 ¥'+totalCum.toLocaleString()+'</span>' +
      '<div class="grid-list">'+projHtml+'</div>' +
    '</div>';
  }).join('');
}

function toggleMiniCard(header) {
  const card = header.closest('.me-mini-card');
  const list = card.querySelector('.me-mini-rec');
  const arrow = header.querySelector('.me-mini-arrow');
  list.classList.toggle('show');
  arrow.classList.toggle('open');
  arrow.textContent = list.classList.contains('show') ? '▼' : '▶';
}

function toggleRec(card) {
  const list = card.querySelector('.rec-list');
  const arrow = card.querySelector('.card-arrow');
  list.classList.toggle('show');
  arrow.textContent = list.classList.contains('show') ? '▼' : '▶';
}

function toggleRecItem(item) {
  item.querySelector('.grid-list').classList.toggle('show');
}

function toggleProj(card) {}

async function collectData() {
  const btn = document.getElementById('btnCollect');
  btn.disabled = true;
  btn.textContent = '⏳ 采集中...';
  const date = document.getElementById('dateInput').value;
  try {
    const resp = await fetch(API + '/collect-today?date=' + date, { method: 'POST' });
    const data = await resp.json();
    const r19 = data.results['19'] || {};
    const r14 = data.results['14'] || {};
    const r16 = data.results['16'] || {};
    btn.textContent = '✅ 集合19:'+(r19.saved||0)+' 集合14/16已存';
    setTimeout(function(){ btn.textContent = '📸 采集当日全量数据'; btn.disabled = false; }, 3000);
    loadData();
  } catch(e) {
    btn.textContent = '❌ 失败';
    btn.disabled = false;
  }
}

async function syncToStore() {
  const btn = document.getElementById('btnSync');
  btn.disabled = true;
  btn.textContent = '⏳ 同步中...';
  const date = document.getElementById('dateInput').value;
  try {
    const cids = [19, 14, 16];
    const results = [];
    for (const cid of cids) {
      btn.textContent = '⏳ 集合'+cid+'...';
      const resp = await fetch(API + '/sync-store?collection_id=' + cid + '&date=' + date, { method: 'POST' });
      const data = await resp.json();
      results.push(data.ok ? cid+'✓' : cid+'✗');
    }
    btn.textContent = '✅ ' + results.join(' ');
    setTimeout(function(){ btn.textContent = '🏪 同步到门店'; btn.disabled = false; }, 3000);
  } catch(e) {
    btn.textContent = '❌ 网络错误';
    btn.disabled = false;
  }
}

document.getElementById('dateInput').addEventListener('change', loadData);

async function loadCron() {
  try {

    document.getElementById('cronDisplay').textContent = String(data.hour).padStart(2,'0') + ':' + String(data.minute).padStart(2,'0');

function toggleCronEdit() {

}

async function saveCron() {
  const hour = parseInt(document.getElementById('cronHour').value) || 0;
  const minute = parseInt(document.getElementById('cronMinute').value) || 0;
  try {
    const resp = await fetch(API + '/sync-cron', {
      method: 'PUT',

    });

// 集合14/16元数据卡片（纯读表，零计算）
let _metaExpandCache = {};  // {14: html, 16: html}

async function loadMetaCards(date) {
  try {
    const resp = await fetch('api/export/collection-meta?date=' + date);
    const data = await resp.json();
    const colors = {14: '#2196F3', 16: '#E91E63'};
    const countN = {14: 4, 16: 6};
    let html = '';
    (data.collections || []).forEach(c => {
      html += '<div class="meta-card" style="background:'+(colors[c.collection_id]||'#666')+'" onclick="toggleMetaCard(this,'+c.collection_id+',\''+date+'\')">' +
        '<div class="mc-label">集合' + c.collection_id + ' · ' + (c.draw_number||'-') + '</div>' +
        '<div class="mc-result">' + (c.result||'--') + '</div>' +
        '<div class="mc-rank">排位 ' + (c.rank||'--') + '</div>' +
        '<div class="mc-arrow">▶</div>' +
      '</div>' +
      '<div class="meta-expand" id="metaExpand'+c.collection_id+'"></div>';
    });
    document.getElementById('metaCards').innerHTML = html || '<div style="color:#999;font-size:13px;padding:8px">无 meta 数据</div>';
  } catch(e) {
    document.getElementById('metaCards').innerHTML = '';
  }
}

async function toggleMetaCard(card, cid, date) {
  const expand = document.getElementById('metaExpand'+cid);
  const arrow = card.querySelector('.mc-arrow');
  if (expand.classList.contains('show')) {
    expand.classList.remove('show');
    arrow.textContent = '▶';
    return;
  }
  if (_metaExpandCache[cid]) {
    expand.innerHTML = _metaExpandCache[cid];
    expand.classList.add('show');
    arrow.textContent = '▼';
    return;
  }
  expand.innerHTML = '<div style="padding:8px;color:#999;font-size:12px">加载中...</div>';
  expand.classList.add('show');
  arrow.textContent = '▼';
  try {
    const maxN = cid === 14 ? 4 : 6;
    const [sumResp, detailResp, gridResp] = await Promise.all([
      fetch('api/export/daily-summary?collection_id=19&date=' + date),
      fetch('api/export/daily-detail?collection_id=19&date=' + date),
      fetch('api/export/grid-detail?collection_id=19&date=' + date)
    ]);
    const sumData = await sumResp.json();
    const detailData = await detailResp.json();
    const gridData = await gridResp.json();
    const summaries = (sumData.summaries || []).slice(0, maxN);
    const allProjects = detailData.summaries || {};
    const allGrids = gridData.grids || {};
    
    let rows = '<div class="me-title">← 来自集合19前'+maxN+'条汇总</div>';
    summaries.forEach(s => {
      const projects = allProjects[s.name] || [];
      const grids = allGrids[s.name] || [];
      const recHtml = buildRecordList(projects, grids, s.name);
      const rgSet = new Set(projects.map(p => p.run_group).filter(Boolean));
      const rankHtml = s.draw_value_rank ? '<span class="me-rank">排位 '+s.draw_value_rank+'</span>' : '';
      const miniArrow = '<span class="me-mini-arrow">▶</span>';
      rows += '<div class="me-mini-card"><div class="me-mini-header" onclick="event.stopPropagation();toggleMiniCard(this)"><div style="display:flex;align-items:center;gap:6px">'+miniArrow+'<span class="me-mini-name">'+s.name+'</span>'+rankHtml+'</div><div><span class="me-val">'+(s.total_value||0).toLocaleString()+'</span></div></div><div class="me-mini-meta">'+rgSet.size+' 记录 · '+projects.length+' 项目</div><div class="rec-list me-mini-rec">'+recHtml+'</div></div>';
    });
    _metaExpandCache[cid] = rows;
    expand.innerHTML = rows;
  } catch(e) {
    expand.innerHTML = '<div style="padding:8px;color:#ee0a24;font-size:12px">加载失败: '+e.message+'</div>';
  }
}

// ── 预警系统 ──
function toggleBellSettings() {
  const popup = document.getElementById('bellPopup');
  const show = popup.style.display === 'none' || !popup.style.display;
  popup.style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('alertThreshold').value = _alertThreshold;
  }
}
async function saveBellSettings() {
  _alertThreshold = parseInt(document.getElementById('alertThreshold').value) || 45;
  toggleBellSettings();
  // 保存到服务端
  try {
    await fetch(API + '/settings', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({alert_threshold: _alertThreshold})
    });
  } catch(e) {}
  loadData();
}
function checkAlerts() {
  const alerts = [];
  for (const [sname, rgs] of Object.entries(_recordRanks)) {
    const dangerCount = rgs.filter(r => r.rank !== null && r.rank > _alertThreshold).length;
    if (dangerCount >= 3) {
      alerts.push({summary: sname, count: dangerCount, rgs: rgs});
    }
  }
  const banner = document.getElementById('alertBanner');
  const bell = document.getElementById('bellBtn');
  const badge = document.getElementById('bellBadge');
  if (alerts.length > 0) {
    const msgs = alerts.map(a => {
      const worst = a.rgs.filter(r=>r.rank!==null&&r.rank>_alertThreshold)
        .sort((a,b)=>(b.rank||0)-(a.rank||0));
      const worstNames = worst.slice(0,3).map(r=>r.run_group+' 排位'+r.rank).join(', ');
      return '<b>'+a.summary+'</b>: '+a.count+'条记录排位>'+_alertThreshold+' ('+worstNames+')';
    });
    banner.innerHTML = '⚠️ ' + msgs.join('<br>');
    banner.style.display = 'block';
    bell.classList.add('has-alert');
    badge.textContent = alerts.length;
    badge.classList.add('show');
  } else {
    banner.style.display = 'none';
    bell.classList.remove('has-alert');
    badge.classList.remove('show');
  }
}
function scrollToFirstAlert() {
  const firstDanger = document.querySelector('.rec-rank-badge.danger');
  if (firstDanger) {
    firstDanger.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

async function initSettings() {
  try {
    const resp = await fetch(API + '/settings');
    const data = await resp.json();
    if (data.alert_threshold) {
      _alertThreshold = parseInt(data.alert_threshold) || 45;
    }
  } catch(e) {}
}
