<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>数字仓库 — 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 50%,#0d1f3c 100%);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
}
.login-card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:40px 32px 32px;
  width:90vw;max-width:360px;
  text-align:center;
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-icon{font-size:48px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:700;color:#e8ecf1;margin-bottom:4px}
.login-subtitle{font-size:13px;color:#8899b0;margin-bottom:24px}
.login-input{
  width:100%;padding:12px 16px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#e8ecf1;font-size:15px;outline:none;
  transition:border-color .2s;
}
.login-input:focus{border-color:#4da6ff;box-shadow:0 0 0 3px rgba(77,166,255,0.15)}
.login-input::placeholder{color:#556677}
.login-btn{
  width:100%;margin-top:16px;padding:12px;
  border-radius:10px;border:none;
  background:linear-gradient(135deg,#4da6ff,#0ea5e9);
  color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .2s,transform .1s;
}
.login-btn:active{transform:scale(.97)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{
  margin-top:12px;font-size:13px;color:#ee0a24;
  min-height:20px;transition:opacity .2s;
}
.login-error:empty{opacity:0}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-icon">🔐</div>
  <div class="login-title">数字仓库轮换系统</div>
  <div class="login-subtitle">请输入密码以继续</div>
  <form id="loginForm" autocomplete="off">
    <input type="password" id="pwd" class="login-input" placeholder="密码" autofocus>
    <button type="submit" id="submitBtn" class="login-btn">登 录</button>
  </form>
  <div class="login-error" id="error"></div>
</div>
<script>
(function(){
  var form=document.getElementById('loginForm');
  var pwd=document.getElementById('pwd');
  var btn=document.getElementById('submitBtn');
  var err=document.getElementById('error');
  var loading=false;

  function showError(msg){
    err.textContent=msg;
    setTimeout(function(){err.textContent=''},5000);
  }

  form.addEventListener('submit',function(e){
    e.preventDefault();
    if(loading)return;
    var v=pwd.value.trim();
    if(!v){showError('请输入密码');return}
    loading=true;
    btn.disabled=true;
    btn.innerHTML='<span class="spin"></span>验证中...';

    fetch('auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:v})
    }).then(function(r){
      return r.json().then(function(d){
        if(!r.ok)throw new Error(d.detail||'登录失败');
        // 登录成功 → 跳转首页
        window.location.href='./';
      }).catch(function(e2){
        if(e2 instanceof SyntaxError)throw new Error('服务器错误');
        throw e2;
      });
    }).catch(function(e){
      showError(e.message||'网络错误');
      loading=false;
      btn.disabled=false;
      btn.textContent='登 录';
      pwd.value='';
      pwd.focus();
    });
  });
})();
</script>
</body>
</html>
