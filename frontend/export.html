<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日汇总</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f2f5; color:#333; padding:12px 12px 40px; font-size:14px; }
.header { text-align:center; margin:8px 0 16px; }
.header .title { font-size:20px; font-weight:700; }
.date-bar { display:flex; gap:8px; margin:12px 0; align-items:center; }
.date-bar input { flex:1; padding:8px 12px; border:1px solid #d0d5dd; border-radius:8px; font-size:15px; background:#fff; }
.date-bar button { padding:8px 18px; background:#1a73e8; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; font-weight:600; }
.date-info { font-size:17px; font-weight:700; text-align:center; padding:4px 0 8px; }
.day-seq { font-size:13px; color:#888; text-align:center; padding:0 0 8px; }
.amount-box { background:linear-gradient(135deg,#1a73e8,#0d47a1); color:#fff; border-radius:12px; padding:18px; text-align:center; margin:8px 0 12px; }
.amount-box .label { font-size:12px; opacity:.8; }
.amount-box .value { font-size:30px; font-weight:700; margin-top:2px; }
.filter-bar { display:flex; align-items:center; gap:6px; padding:8px 0; flex-wrap:wrap; }
.filter-label { font-size:12px; color:#888; white-space:nowrap; }
.filter-chip { display:inline-flex; align-items:center; gap:3px; padding:3px 10px; border-radius:14px; font-size:12px; background:#f0f0f0; cursor:pointer; user-select:none; border:1px solid transparent; }
.filter-chip:has(input:checked) { background:#e3f2fd; border-color:#90caf9; color:#1565c0; }
.filter-chip input { display:none; }
.btn-collect { width:100%; padding:12px; background:#4caf50; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; margin:8px 0; cursor:pointer; }
.btn-collect:active { opacity:.8; }
.btn-collect:disabled { background:#aaa; }
.btn-sync { width:100%; padding:12px; background:#ff9800; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; margin:0 0 8px; cursor:pointer; }
.btn-sync:active { opacity:.8; }
.btn-sync:disabled { background:#aaa; }
.cron-row { display:flex; align-items:center; gap:8px; padding:10px 0; font-size:14px; flex-wrap:wrap; }
.cron-label { color:#888; }
.cron-time { font-weight:700; color:#ff9800; font-size:16px; }
.cron-edit { padding:4px 12px; background:none; border:1px solid #ff9800; color:#ff9800; border-radius:6px; font-size:12px; cursor:pointer; }
.cron-edit-panel { display:flex; align-items:center; gap:6px; width:100%; margin-top:6px; }
.cron-edit-panel input { padding:6px; border:1px solid #d0d5dd; border-radius:6px; font-size:14px; }
.cron-save { padding:6px 14px; background:#ff9800; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer; }
.cron-cancel { padding:6px 14px; background:none; border:1px solid #d0d5dd; color:#888; border-radius:6px; font-size:13px; cursor:pointer; }
.card { background:#fff; border-radius:10px; padding:14px; margin:8px 0; box-shadow:0 1px 3px rgba(0,0,0,.06); cursor:pointer; }
.card-header { display:flex; justify-content:space-between; align-items:center; }
.card .name { font-size:16px; font-weight:600; }
.card .meta { font-size:11px; color:#888; margin-top:2px; }
.card .val { font-size:20px; font-weight:700; color:#1a73e8; }
.card .rate { font-size:11px; color:#4caf50; text-align:right; }
.card-arrow { font-size:11px; color:#aaa; margin-left:4px; }
.rank { display:inline-block; background:#1a73e8; color:#fff; font-size:11px; font-weight:700; padding:1px 6px; border-radius:8px; margin-right:4px; vertical-align:middle; }
.draw-rank { display:inline-block; background:#e65100; color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; margin-left:6px; vertical-align:middle; }
.proj-list { display:none; margin-top:10px; padding-top:10px; border-top:1px solid #eee; }
.proj-list.show { display:block; }
.proj-item { display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px solid #f5f5f5; cursor:pointer; flex-wrap:wrap; }
.proj-item:last-child { border-bottom:none; }
.proj-name { font-size:13px; color:#555; }
.proj-val { font-size:13px; font-weight:600; color:#1565c0; }
.proj-grids { color:#999; font-size:11px; margin-left:4px; }
.grid-list { display:none; width:100%; margin-left:16px; padding:4px 0 4px 8px; border-left:2px solid #e3f2fd; }
.grid-list.show { display:block; }
.grid-item { display:flex; justify-content:space-between; padding:4px 0; font-size:12px; }
.grid-cn { color:#e65100; font-weight:600; min-width:32px; }
.grid-nums { color:#555; flex:1; margin:0 8px; word-break:break-all; }
.grid-val { color:#1565c0; font-weight:600; white-space:nowrap; }
.loading { text-align:center; padding:40px; color:#999; }
.empty { text-align:center; padding:40px; color:#999; font-size:14px; }
.expand-hint { font-size:11px; color:#ccc; text-align:center; margin-top:2px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:center;gap:6px;align-items:center">
    <select id="collSelect" onchange="switchColl()" style="padding:4px 10px;border:1px solid #d0d5dd;border-radius:6px;font-size:14px;margin-right:4px">
      <option value="19">A级集合 (汇总1-6)</option>
      <option value="14">日汇总1-4</option>
      <option value="16">日汇总1-6</option>
    </select>
    <div class="title">📊 每日汇总</div>
  </div>
</div>
<div class="date-info"><span id="dateInfo">--</span><span id="formulaText" style="color:#9c27b0;font-size:12px"></span></div>
<div class="day-seq" id="daySeq"></div>

<div class="date-bar">
  <input type="date" id="dateInput">
  <button onclick="loadData()">查询</button>
</div>

<div class="amount-box">
  <div class="label">累计总额</div>
  <div class="value" id="dailyAmount">--</div>
</div>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">汇总筛选</span>
</div>

<button class="btn-collect" onclick="collectData()" id="btnCollect">📸 采集当日全量数据</button>
<button class="btn-sync" onclick="oneKeySync()" id="btnSync">🚀 一键同步</button>

<div class="cron-row">
  <span class="cron-label">⏰ 定时同步</span>
  <span class="cron-time" id="cronDisplay">02:00</span>
  <button class="cron-edit" onclick="toggleCronEdit()">修改</button>
  <div class="cron-edit-panel" id="cronEditPanel" style="display:none">
    <input type="number" id="cronHour" min="0" max="23" value="2" style="width:50px;text-align:center"> :
    <input type="number" id="cronMinute" min="0" max="59" value="0" style="width:50px;text-align:center">
    <button class="cron-save" onclick="saveCron()">保存</button>
    <button class="cron-cancel" onclick="toggleCronEdit()">取消</button>
  </div>
</div>

<div id="cardList"></div>

<script>
const API = 'api/export';
const urlParams = new URLSearchParams(window.location.search);
const CID = parseInt(urlParams.get('cid')) || 19;
let _summariesData = [];
let _gridFormulaData = []; // 集合16: 每个汇总的 v47 & cum 值
let _drawNumber = null;
let _collName = '';

// 加载集合信息 → 动态构建筛选芯片
async function initCollection() {
  try {
    const resp = await fetch(API + '/collection-info?collection_id=' + CID);
    const data = await resp.json();
    _collName = data.collection_name;
    document.querySelector('.title').textContent = '📊 ' + _collName;
    // 同步下拉框
    document.getElementById('collSelect').value = CID;
    // 动态构建 filter chips
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '<span class="filter-label">汇总筛选</span>';
    if (CID === 16) {
      const label = document.createElement('label');
      label.className = 'filter-chip';
      label.innerHTML = '<input type="checkbox" checked onchange="onFilterChange(this)" data-name="__all__">汇总1-汇总6';
      bar.appendChild(label);
    }
    data.summaries.forEach((s, i) => {
      const label = document.createElement('label');
      label.className = 'filter-chip';
      label.id = 'chip' + (i+1);
      const chipLabel = (CID === 16) ? ('汇总' + (i+1)) : s.name;
      const chipName = (CID === 16) ? (s.name + '_' + i) : s.name;
      label.innerHTML = '<input type="checkbox" checked onchange="onFilterChange(this)" data-name="'+chipName+'" data-idx="'+i+'">' + chipLabel;
      bar.appendChild(label);
    });
    // 默认全选中，初始累计需要等 loadData 后再算
  } catch(e) {
    console.error('加载集合信息失败', e);
  }
}

function switchColl() {
  const newCID = document.getElementById('collSelect').value;
  window.location.search = '?cid=' + newCID;
}

// 筛选变化 → 重算累计 & 显隐卡片
function onFilterChange(el) {
  const allChip = document.querySelector('.filter-chip input[data-name="__all__"]');
  
  // 只有点击 __all__ 芯片才同步所有子芯片
  if (allChip && el && el.dataset.name === '__all__') {
    const chk = allChip.checked;
    document.querySelectorAll('.filter-chip input[data-name]:not([data-name="__all__"])').forEach(cb => {
      cb.checked = chk;
      const idx = Array.from(document.querySelectorAll('.filter-chip input[data-name]:not([data-name="__all__"])')).indexOf(cb);
      const card = document.querySelectorAll('.card')[idx];
      if (card) card.style.display = chk ? '' : 'none';
    });
  }
  
  // 独立芯片: 各自显隐对应卡片
  if (allChip && el && el.dataset.name !== '__all__') {
    const idx = Array.from(document.querySelectorAll('.filter-chip input[data-name]:not([data-name="__all__"])')).indexOf(el);
    const card = document.querySelectorAll('.card')[idx];
    if (card) card.style.display = el.checked ? '' : 'none';
  }
  
  // 更新 __all__ 状态（子芯片全选→勾上，否则取消）
  if (allChip && el && el.dataset.name !== '__all__') {
    const subs = document.querySelectorAll('.filter-chip input[data-name]:not([data-name="__all__"])');
    allChip.checked = Array.from(subs).every(cb => cb.checked);
  }
  
  // 重算累计
  const isC16 = CID === 16;
  let total = 0;
  if (isC16) {
    // 集合16: 直接用idx匹配（芯片名和_summariesData名不同）
    const chips = document.querySelectorAll('.filter-chip input[data-idx]');
    chips.forEach(cb => {
      if (cb.checked) {
        const idx = parseInt(cb.dataset.idx);
        total += (_summariesData[idx]?.total_value || 0);
      }
    });
  } else {
    const checked = new Set();
    document.querySelectorAll('.filter-chip input:checked').forEach(cb => checked.add(cb.dataset.name));
    _summariesData.forEach(s => { if (checked.has(s.name)) total += (s.total_value || 0); });
  }
  document.getElementById('dailyAmount').textContent = total.toLocaleString();
  // 集合16: 更新公式
  if (isC16) updateFormula();
}

function updateFormula() {
  if (!_drawNumber) return;
  let v47 = 0, cum = 0;
  document.querySelectorAll('.filter-chip input[data-idx]').forEach(cb => {
    if (cb.checked) {
      const idx = parseInt(cb.dataset.idx);
      const d = _gridFormulaData[idx] || {v47: 0, cum: 0};
      v47 += d.v47;
      cum += d.cum;
    }
  });
  const result = v47 * 47 - cum;
  const formulaSpan = document.getElementById('formulaText');
  if (formulaSpan) {
    formulaSpan.innerHTML = '→ 抽#' + _drawNumber + ' = ' + v47.toLocaleString() + ' × 47 − ' + cum.toLocaleString() + ' = ' + result.toLocaleString();
  }
}

// 默认取最新快照日期
async function initDefaultDate() {
  try {
    const resp = await fetch(API + '/latest-snapshot-date?collection_id=' + CID);
    const data = await resp.json();
    return data.date || new Date().toISOString().split('T')[0];
  } catch(e) {
    return new Date().toISOString().split('T')[0];
  }
}

async function loadData() {
  const date = document.getElementById('dateInput').value;
  document.getElementById('cardList').innerHTML = '<div class="loading">加载中...</div>';
  document.getElementById('dailyAmount').textContent = '--';
  document.getElementById('dateInfo').textContent = '加载中...';
  
  try {
    const [sumResp, detailResp, gridResp] = await Promise.all([
      fetch(API + '/daily-summary?collection_id=' + CID + '&date=' + date),
      fetch(API + '/daily-detail?collection_id=' + CID + '&date=' + date),
      fetch(API + '/grid-detail?collection_id=' + CID + '&date=' + date)
    ]);
    const sumData = await sumResp.json();
    const detailData = await detailResp.json();
    const gridData = await gridResp.json();
    
    document.getElementById('dateInfo').textContent = sumData.date + '  ·  抽签数' + (sumData.draw_number || '-');
    document.getElementById('daySeq').textContent = sumData.day_seq ? '日期序号 ' + sumData.day_seq : '';
    _summariesData = sumData.summaries || [];
    
    // 集合16: 存分项公式数据
    if (CID === 16 && sumData.draw_number) {
      _drawNumber = sumData.draw_number;
      const dn = sumData.draw_number;
      const grids = gridData.grids || {};
      const summaryNames = Object.keys(grids);
      // 按 summaryIdx → {v47, cum} 累加
      _gridFormulaData = new Array(summaryNames.length).fill(null).map(() => ({v47: 0, cum: 0}));
      summaryNames.forEach((sn, si) => {
        grids[sn].forEach(g => {
          if (g.count_n === dn) {
            _gridFormulaData[si].v47 += (g.value_x_47 || 0);
            _gridFormulaData[si].cum += (g.cumulative_sum || 0);
          }
        });
      });
    }
    
    onFilterChange();  // 按筛选重算累计
    
    if (!sumData.summaries || sumData.summaries.length === 0) {
      document.getElementById('cardList').innerHTML = '<div class="empty">暂无数据，请先采集</div>';
      return;
    }
    
    const projMap = detailData.summaries || {};
    const gridMap = gridData.grids || {};
    let html = '';
    sumData.summaries.forEach(s => {
      const projects = projMap[s.name] || [];
      const totalGrids = projects.reduce((acc,p) => acc + (p.grid_count || 0), 0);
      const drawRank = s.draw_value_rank;
      const drawRankHtml = drawRank ? ' <span class="draw-rank">排位 '+drawRank+'</span>' : '';
      html += '<div class="card" onclick="toggleProj(this)"><div class="card-header"><div><div class="name">'+s.name+drawRankHtml+' <span class="card-arrow">▶</span></div><div class="meta">'+s.projects+' 项目 · 命中率 '+s.hit_rate+'%</div></div><div><div class="val">¥'+(s.total_value || 0).toLocaleString()+'</div><div class="rate">'+s.hit_rate+'%</div></div></div><div class="proj-list">'+buildProjList(s.name, projects, gridMap)+'</div></div>';
    });
    document.getElementById('cardList').innerHTML = html + '<div class="expand-hint">👆 点击卡片展开项目 & 排位明细</div>';
  } catch(e) {
    document.getElementById('cardList').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  }
}

function buildProjList(sn, projects, gridMap) {
  const snGrids = gridMap[sn] || [];
  const gridByPid = {};
  snGrids.forEach(g => {
    if (!gridByPid[g.project_id]) gridByPid[g.project_id] = [];
    gridByPid[g.project_id].push(g);
  });
  return projects.map(p => {
    const grids = gridByPid[p.project_id] || [];
    const gridHtml = grids.map(g => '<div class="grid-item"><span class="grid-cn">'+g.count_n+'中</span><span class="grid-nums">v='+g.value+'</span><span class="grid-val">×47='+(g.value_x_47||0).toLocaleString()+'</span></div>').join('');
    return '<div class="proj-item" onclick="event.stopPropagation();toggleGrid(this)"><div><span class="proj-name">'+p.project_name+'</span><span class="proj-grids">'+grids.length+'排位</span></div><span class="proj-val">¥'+(p.value || 0).toLocaleString()+'</span><div class="grid-list">'+gridHtml+'</div></div>';
  }).join('');
}

function toggleProj(card) {
  const list = card.querySelector('.proj-list');
  const arrow = card.querySelector('.card-arrow');
  list.classList.toggle('show');
  arrow.textContent = list.classList.contains('show') ? '▼' : '▶';
}

function toggleGrid(item) {
  item.querySelector('.grid-list').classList.toggle('show');
}

async function collectData() {
  const btn = document.getElementById('btnCollect');
  btn.disabled = true;
  const date = document.getElementById('dateInput').value;
  
  try {
    btn.textContent = '⏳ 采集集合19...';
    const resp = await fetch(API + '/save-daily?collection_id=' + CID + '&date=' + date, { method: 'POST' });
    const data = await resp.json();
    
    // 集合19采集完 → 自动补缺14/16
    let msg14 = '', msg16 = '';
    if (CID === 19 && data.ok) {
      btn.textContent = '⏳ 补缺集合14...';
      const r14 = await fetch(API + '/save-daily?collection_id=14&date=' + date, { method: 'POST' });
      const d14 = await r14.json();
      msg14 = ' 14:' + d14.saved + '汇';
      
      btn.textContent = '⏳ 补缺集合16...';
      const r16 = await fetch(API + '/save-daily?collection_id=16&date=' + date, { method: 'POST' });
      const d16 = await r16.json();
      msg16 = ' 16:' + d16.saved + '汇';
    }
    
    btn.textContent = '✅ 19:' + data.saved + '汇' + msg14 + msg16;
    setTimeout(function(){ btn.textContent = '📸 采集当日全量数据'; btn.disabled = false; }, 3000);
    loadData();
  } catch(e) {
    btn.textContent = '❌ 失败';
    btn.disabled = false;
  }
}

async function oneKeySync() {
  const btn = document.getElementById('btnSync');
  btn.disabled = true;
  const date = document.getElementById('dateInput').value;
  
  // 集合14/16：先采集再同步，同时推个体门店
  const cids = (CID === 14 || CID === 16) ? [14, 16] : [CID];
  
  btn.textContent = '⏳ 采集中...';
  for (const cid of cids) {
    await fetch(API + '/save-daily?collection_id=' + cid + '&date=' + date, { method: 'POST' });
  }
  
  btn.textContent = '⏳ 同步中...';
  let ok = true, msg = '';
  try {
    for (const cid of cids) {
      const resp = await fetch(API + '/sync-store?collection_id=' + cid + '&date=' + date, { method: 'POST' });
      const data = await resp.json();
      if (!data.ok) { ok = false; msg = data.error || '失败'; break; }
    }
  } catch(e) { ok = false; msg = '网络错误'; }
  
  btn.textContent = ok ? '✅ 已同步' : ('❌ ' + msg);
  loadData();
  setTimeout(() => { btn.textContent = '🚀 一键同步'; btn.disabled = false; }, 3000);
}

document.getElementById('dateInput').addEventListener('change', loadData);

// ── 定时同步时间编辑 ──
async function loadCron() {
  try {
    const resp = await fetch(API + '/sync-cron');
    const data = await resp.json();
    document.getElementById('cronDisplay').textContent = String(data.hour).padStart(2,'0') + ':' + String(data.minute).padStart(2,'0');
    document.getElementById('cronHour').value = data.hour;
    document.getElementById('cronMinute').value = data.minute;
  } catch(e) {}
}

function toggleCronEdit() {
  const panel = document.getElementById('cronEditPanel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

async function saveCron() {
  const hour = parseInt(document.getElementById('cronHour').value) || 0;
  const minute = parseInt(document.getElementById('cronMinute').value) || 0;
  try {
    const resp = await fetch(API + '/sync-cron', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({hour: hour, minute: minute})
    });
    const data = await resp.json();
    if (data.ok) {
      document.getElementById('cronDisplay').textContent = String(hour).padStart(2,'0') + ':' + String(minute).padStart(2,'0');
      toggleCronEdit();
    }
  } catch(e) {}
}

// 初始化
loadCron();
initCollection().then(function() {
  return initDefaultDate();
}).then(function(d) {
  document.getElementById('dateInput').value = d;
  loadData();
});
</script>
</body>
</html>
